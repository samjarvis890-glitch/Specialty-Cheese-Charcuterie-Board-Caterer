<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | L'Artisan</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512' fill='%232563EB'><path d='M512 240.2l0 15.8L0 256c0-20 10-38.7 26.6-49.8L274.9 40.7c8.6-5.7 18.6-8.7 28.9-8.7C418.8 32 512 125.2 512 240.2zm0 47.8l0 128c0 35.3-28.7 64-64 64L64 480c-35.3 0-64-28.7-64-64L0 288l512 0z'/></svg>"><path d='M512 240.2l0 15.8L0 256c0-20 10-38.7 26.6-49.8L274.9 40.7c8.6-5.7 18.6-8.7 28.9-8.7C418.8 32 512 125.2 512 240.2zm0 47.8l0 128c0 35.3-28.7 64-64 64L64 480c-35.3 0-64-28.7-64-64L0 288l512 0z'/></svg>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#2563EB',
                            dark: '#1D4ED8'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(0, 0, 0, 0.04) 1px, transparent 1px), linear-gradient(to bottom, rgba(0, 0, 0, 0.04) 1px, transparent 1px);
        }
        .dark .bg-grid {
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }
    </style>
</head>
<body class="antialiased bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-white transition-colors duration-300 min-h-screen lg:h-screen lg:overflow-hidden">
    <div class="h-full min-h-screen lg:min-h-0 flex flex-col justify-center items-center relative p-4 lg:py-6 lg:px-8">
        <!-- Grid Background -->
        <div class="absolute inset-0 z-0 bg-grid pointer-events-none"></div>

        <!-- Top Right Controls -->
        <div class="absolute top-4 right-4 md:top-6 md:right-6 z-20 flex gap-3">
            <button id="rtl-toggle" class="w-10 h-10 flex items-center justify-center bg-white dark:bg-gray-800 rounded-full shadow-sm text-gray-500 dark:text-gray-400 hover:text-primary dark:hover:text-primary transition-colors border border-gray-100 dark:border-gray-700">
                <i class="fa-solid fa-right-left"></i>
            </button>
            <button id="theme-toggle" class="w-10 h-10 flex items-center justify-center bg-white dark:bg-gray-800 rounded-full shadow-sm text-gray-500 dark:text-gray-400 hover:text-primary dark:hover:text-primary transition-colors border border-gray-100 dark:border-gray-700">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>

        <!-- Go Back Home -->
        <div class="absolute top-4 left-4 md:top-6 md:left-6 z-20">
            <a href="index.html" class="w-10 h-10 flex items-center justify-center bg-white dark:bg-gray-800 rounded-full shadow-sm text-gray-500 dark:text-gray-400 hover:text-primary dark:hover:text-primary transition-colors border border-gray-100 dark:border-gray-700">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
        </div>

        <!-- Auth Card -->
        <div class="bg-white dark:bg-gray-900 rounded-[2rem] shadow-2xl w-full max-w-[620px] p-6 md:p-8 lg:p-10 relative z-10 border border-gray-100 dark:border-gray-800 my-auto">
            
            <!-- Logo -->
            <div class="text-center mb-5 lg:mb-4">
                <a href="index.html" class="inline-flex items-center gap-3 text-2xl font-serif font-bold text-primary">
                    <i class="fa-solid fa-cheese text-3xl"></i>
                    <span class="tracking-widest uppercase">L'Artisan</span>
                </a>
            </div>

            <!-- Welcome Text -->
            <div class="text-center mb-5 lg:mb-4">
                <h2 class="text-2xl font-serif font-bold text-gray-900 dark:text-white mb-2">Create Account</h2>
                
            </div>

            <!-- Form -->
            <form action="#" method="POST" class="space-y-4 lg:space-y-3">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-4 gap-y-4 lg:gap-y-3">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5 lg:mb-1">First Name</label>
                        <input type="text" class="w-full px-4 py-3 lg:py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary dark:text-white transition-colors" placeholder="Enter your first name" required>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5 lg:mb-1">Last Name</label>
                        <input type="text" class="w-full px-4 py-3 lg:py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary dark:text-white transition-colors" placeholder="Enter your last name" required>
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5 lg:mb-1">Email Address</label>
                        <input type="email" class="w-full px-4 py-3 lg:py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary dark:text-white transition-colors" placeholder="e.g. secure@example.com" required>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5 lg:mb-1">Password</label>
                        <div class="relative">
                            <input type="password" id="password" class="w-full px-4 py-3 lg:py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary dark:text-white transition-colors pr-12" placeholder="Create a password" required>
                            <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 focus:outline-none" onclick="togglePassword('password')">
                                <i class="fa-regular fa-eye" id="password-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5 lg:mb-1">Confirm Password</label>
                        <div class="relative">
                            <input type="password" id="confirm-password" class="w-full px-4 py-3 lg:py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary dark:text-white transition-colors pr-12" placeholder="Repeat your password" required>
                            <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 focus:outline-none" onclick="togglePassword('confirm-password')">
                                <i class="fa-regular fa-eye" id="confirm-password-eye"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="pt-1">
                    <label class="flex items-start gap-2 cursor-pointer group">
                        <input type="checkbox" class="w-4 h-4 mt-0.5 rounded border-gray-300 text-primary focus:ring-primary bg-gray-50 dark:bg-gray-800 dark:border-gray-700" required>
                        <span class="text-sm text-gray-600 dark:text-gray-400 group-hover:text-gray-900 dark:group-hover:text-white transition-colors">I agree to the <a href="#" class="text-primary hover:underline">Terms of Service</a> & <a href="#" class="text-primary hover:underline">Privacy Policy</a></span>
                    </label>
                </div>

                <button type="submit" class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3 px-4 rounded-xl transition-colors shadow-lg shadow-primary/30 flex items-center justify-center gap-2 mt-3.5 lg:mt-2.5">
                    <i class="fa-solid fa-lock text-sm"></i>
                    Register Account
                </button>
            </form>

            <!-- Divider -->
            <div class="flex items-center my-5 lg:my-4">
                <div class="flex-grow border-t border-gray-200 dark:border-gray-700"></div>
                <span class="px-4 text-xs font-semibold text-gray-400 dark:text-gray-500 tracking-wider uppercase">Or Sign Up With</span>
                <div class="flex-grow border-t border-gray-200 dark:border-gray-700"></div>
            </div>

            <!-- Social Buttons -->
            <div class="flex justify-center gap-4 mb-5 lg:mb-4">
                <button class="w-11 h-11 flex items-center justify-center rounded-full border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-700 dark:text-white hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors shadow-sm hover:shadow">
                    <i class="fa-brands fa-google text-lg"></i>
                </button>
                <button class="w-11 h-11 flex items-center justify-center rounded-full border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-[#1877F2] dark:text-[#1877F2] hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors shadow-sm hover:shadow">
                    <i class="fa-brands fa-facebook-f text-lg"></i>
                </button>
                <button class="w-11 h-11 flex items-center justify-center rounded-full border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-black dark:text-white hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors shadow-sm hover:shadow">
                    <i class="fa-brands fa-apple text-xl mb-0.5"></i>
                </button>
            </div>

            <!-- Bottom Link -->
            <a href="login.html" class="block w-full py-3.5 px-4 lg:py-2.5 rounded-xl border border-primary/30 dark:border-primary/50 text-center font-semibold text-primary hover:bg-primary/5 dark:hover:bg-primary/10 transition-colors">
                Already have an account? Log In
            </a>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const eyeIcon = document.getElementById(inputId + '-eye');
            if (input.type === 'password') {
                input.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
